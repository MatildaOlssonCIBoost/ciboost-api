name: Deploy to Azure Function App
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Krävs för OIDC-inloggning mot Azure (federated credential).
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      # Loggar in mot Azure med OIDC – ingen publish profile / basic auth behövs.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deployar via den inloggade Azure-kontexten (AAD-token mot Kudu/SCM),
      # så det fungerar även när SCM Basic Auth är avstängt.
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ciboost-api-v2
          package: .
          scm-do-build-during-deployment: false
          enable-oryx-build: false
